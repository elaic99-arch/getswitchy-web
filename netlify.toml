# .well-known files served as application/json (Universal Links / App Links)
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"

# Edge Functions handle /item/* and /sitemap.xml proxying with forced charset=utf-8
# (see netlify/edge-functions/item-proxy.ts and sitemap-proxy.ts)
